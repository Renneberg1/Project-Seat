<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Seat{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=6">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-global">
            <a href="/phases/" class="nav-link {% if request.url.path.startswith('/phases') %}active{% endif %}">Phase Gates</a>
            <a href="/spinup/" class="nav-link {% if request.url.path.startswith('/spinup') %}active{% endif %}">Spin Up</a>
            <a href="/import/" class="nav-link {% if request.url.path.startswith('/import') %}active{% endif %}">Import</a>
        </div>
        <div class="nav-project-selector">
            {% if nav_projects is defined and nav_projects %}
            <select id="project-select" onchange="if(this.value) window.location.href='/project/'+this.value+'/dashboard'">
                <option value="">Select project...</option>
                {% for p in nav_projects %}
                <option value="{{ p.id }}" {% if selected_project_id is defined and selected_project_id == p.id %}selected{% endif %}>
                    {{ p.name }}
                </option>
                {% endfor %}
            </select>
            {% endif %}
        </div>
        <div class="nav-project-tabs">
            {% if selected_project_id is defined and selected_project_id %}
            <a href="/project/{{ selected_project_id }}/dashboard"
               class="nav-link {% if request.url.path == '/project/' ~ selected_project_id|string ~ '/dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/project/{{ selected_project_id }}/features"
               class="nav-link {% if '/features' in request.url.path and request.url.path.startswith('/project/') %}active{% endif %}">Features</a>
            <a href="/project/{{ selected_project_id }}/documents"
               class="nav-link {% if '/documents' in request.url.path and request.url.path.startswith('/project/') %}active{% endif %}">Documents</a>
            <a href="/project/{{ selected_project_id }}/approvals"
               class="nav-link {% if request.url.path == '/project/' ~ selected_project_id|string ~ '/approvals' %}active{% endif %}">Approvals</a>
            <a href="/project/{{ selected_project_id }}/transcript/"
               class="nav-link {% if '/transcript' in request.url.path and request.url.path.startswith('/project/') %}active{% endif %}">Transcripts</a>
            <a href="/project/{{ selected_project_id }}/charter/"
               class="nav-link {% if '/charter' in request.url.path and request.url.path.startswith('/project/') %}active{% endif %}">Charter</a>
            <a href="/project/{{ selected_project_id }}/team-progress"
               class="nav-link {% if '/team-progress' in request.url.path and request.url.path.startswith('/project/') %}active{% endif %}">Teams</a>
            <button class="nav-link refresh-btn"
                    hx-post="/project/{{ selected_project_id }}/refresh"
                    title="Refresh cached data">&#x21bb;</button>
            {% endif %}
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
