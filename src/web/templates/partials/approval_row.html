<tr id="approval-row-{{ item.id }}" class="status-{{ item.status.value }}">
    <td>{{ item.id }}</td>
    <td>{{ item.action_type.value }}</td>
    <td>{{ item.preview }}</td>
    <td><span class="badge badge-{{ item.status.value }}">{{ item.status.value }}</span></td>
    <td>{{ item.resolved_at or '' }}</td>
    <td>
        {% if item.status.value == "failed" and approval_base_url is defined %}
        <button hx-post="{{ approval_base_url }}/{{ item.id }}/retry"
                class="btn btn-sm">Retry</button>
        {% endif %}
    </td>
</tr>
